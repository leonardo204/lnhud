name: LnHud
options:
  bundleIdPrefix: com.zerolive
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  LnHud:
    type: application
    platform: macOS
    sources:
      - path: Sources/LnHud
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zerolive.LnHud
        INFOPLIST_FILE: Sources/LnHud/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/LnHud/LnHud.entitlements
        DEVELOPMENT_TEAM: XU8HS9JUTS
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    info:
      path: Sources/LnHud/Info.plist
      properties:
        CFBundleName: LnHud
        CFBundleDisplayName: LnHud
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - lnhud
            CFBundleURLName: com.zerolive.LnHud

  LnHudTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/LnHudTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LnHud
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zerolive.LnHudTests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: XU8HS9JUTS
        CODE_SIGN_STYLE: Automatic

schemes:
  LnHud:
    build:
      targets:
        LnHud: all
        LnHudTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LnHudTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
